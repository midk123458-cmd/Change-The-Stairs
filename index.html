<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./styles.css"> <title>RPG - Dragon Repeller</title>
  </head>
  <body>
    <div id="game-container"> 
      <div id="game">
        <div id="visual">
          <img id="heroImage" src="./images/hero.png" alt="Hero">
          <img id="monsterImage" src="" alt="Monster">
        </div>
        <div id="stats">
          <span class="stat">Level: <strong><span id="levelText">1</span></strong></span> 
          <span class="stat">XP: <strong><span id="xpText">0</span></strong></span>
          <span class="stat">Health: <strong><span id="healthText">100</span></strong></span>
          <span class="stat">Gold: <strong><span id="goldText">50</span></strong></span>
          <div class="health-bar-container">
              <div id="playerHealthBar" class="health-bar"></div>
          </div>
          <!-- <span class="stat">Weapon: <strong><span id="weaponText">stick</span></strong></span> -->
        </div>
        <div id="controls">
          <button id="button1">Go to store</button>
          <button id="button2">Go to cave</button>
          <button id="button3">Fight dragon</button>
        </div>
        <div id="monsterStats">
          <span class="stat">Monster Name: <strong><span id="monsterName"></span></strong></span>
          <span class="stat">Health: <strong><span id="monsterHealth"></span></strong></span>
          <div class="health-bar-container">
              <div id="monsterHealthBar" class="health-bar"></div>
          </div>
        </div>
        <div id="text">
          Welcome to Dragon Repeller. You must defeat the dragon that is preventing people from leaving the town. You are in the town square. Where do you want to go? Use the buttons above.
        </div>
      </div>

      <div id="inventoryScreen">
        <h2>INVENTORY</h2>
          <div id="inventoryContent">
          </div>
      </div>

    </div> 

    <footer>
      <p id="credits-text"></p>
    </footer>
    
    <script src="./script.js"></script>
  </body>
</html>
